# Dgraph stack — single port via Caddy reverse proxy
# Default port: 28080 (override with GRAPH_PORT env var)
#
# Usage:
#   podman compose up -d
#   podman compose down
#   podman compose down -v   # also remove data volumes

services:
  zero:
    restart: unless-stopped
    image: dgraph/dgraph:v24.0.5
    command: dgraph zero --my=zero:5080
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6080/health || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 20s
    networks:
      - dgraph
    volumes:
      - zero-data:/dgraph

  alpha:
    restart: unless-stopped
    image: dgraph/dgraph:v24.0.5
    command: dgraph alpha --my=alpha:7080 --zero=zero:5080 --security whitelist=0.0.0.0/0
    depends_on:
      zero:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 20s
    networks:
      - dgraph
    volumes:
      - alpha-data:/dgraph

  ratel:
    restart: unless-stopped
    image: dgraph/ratel:v21.12.0
    networks:
      - dgraph

  caddy:
    restart: unless-stopped
    image: caddy:2-alpine
    depends_on:
      alpha:
        condition: service_healthy
    networks:
      - dgraph
    ports:
      - "${GRAPH_PORT:-28080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro

networks:
  dgraph:

volumes:
  zero-data:
  alpha-data:
